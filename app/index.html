<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-SW Workstation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #38bdf8;
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .box {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      background: #1e293b;
      display: inline-block;
    }

    .success {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🚀 Hello Docker</h1>
  <p>AI-SW 개발 워크스테이션 과제 페이지</p>

  <div class="box">
    <p class="success">✔ 컨테이너 실행 성공</p>
    <p>✔ 포트 매핑 완료</p>
    <p>✔ 웹 서버 정상 동작</p>
  </div>

  <div class="box">
    <p><strong>Port:</strong> 8080</p>
    <p><strong>Environment:</strong> Docker + NGINX</p>
  </div>

</body>
